<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Marks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">Update Marks for {{ student.name }}</h4>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Student ID</label>
            <input type="text" class="form-control" value="{{ student.student_id }}" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">Student Name</label>
            <input type="text" class="form-control" value="{{ student.name }}" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">Teacher</label>
            <input type="text" class="form-control" value="{{ teacher.name }}" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">Marks</label>
            <input type="number" name="marks" class="form-control" value="{{ student.marks }}" min="0" max="100" required>
          </div>
          <button type="submit" class="btn btn-primary">Save Marks</button>
          <a href="{% url 'teachers:teacher_dashboard' %}" class="btn btn-secondary ms-2">Back</a>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
