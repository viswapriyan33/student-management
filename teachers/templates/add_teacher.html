<div class="container mt-4">
  <h2>Add Teacher</h2>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3"><input type="text" name="teacher_id" class="form-control" placeholder="Teacher ID"></div>
    <div class="mb-3"><input type="text" name="name" class="form-control" placeholder="Name"></div>
    <div class="mb-3"><input type="text" name="subject" class="form-control" placeholder="Subject"></div>
    <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="Email"></div>
    <div class="mb-3"><input type="text" name="login_id" class="form-control" placeholder="Login ID"></div>
    <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Password"></div>
    <button type="submit" class="btn btn-success">Save</button>
  </form>
</div>
