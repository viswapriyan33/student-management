<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow">
          <div class="card-header text-center bg-primary text-white">
            <h4>School Management Login</h4>
          </div>
          <div class="card-body">
            {% if messages %}
              {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
              {% endfor %}
            {% endif %}

            <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab">Login</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" id="forgot-tab" data-bs-toggle="tab" data-bs-target="#forgot-pane" type="button" role="tab">Forgot Password</button>
              </li>
            </ul>

            <div class="tab-content">
              <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                <form method="post">
                  {% csrf_token %}
                  <input type="hidden" name="form_type" value="login">
                  <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                  </div>
                  <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                  </div>
                  <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
              </div>

              <div class="tab-pane fade" id="forgot-pane" role="tabpanel">
                <form method="post">
                  {% csrf_token %}
                  <input type="hidden" name="form_type" value="forgot_password">
                  <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                  </div>
                  <div class="mb-3">
                    <input type="password" name="old_password" class="form-control" placeholder="Old Password" required>
                  </div>
                  <div class="mb-3">
                    <input type="password" name="new_password" class="form-control" placeholder="New Password" required>
                  </div>
                  <div class="mb-3">
                    <input type="password" name="confirm_new_password" class="form-control" placeholder="Confirm New Password" required>
                  </div>
                  <button type="submit" class="btn btn-outline-primary w-100">Change Password</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
